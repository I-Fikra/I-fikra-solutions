<app-floating-configurator />

<div class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-screen overflow-hidden">
    <div class="flex flex-col items-center justify-center">

        <div class="auth-gradient-border">
            <div class="w-full bg-surface-0 dark:bg-surface-900 py-20 px-8 sm:px-20" style="border-radius: 53px">

                <!-- HEADER -->
                <div class="text-center mb-8">
                    <i class="pi pi-palette mb-8 mx-auto block" style="font-size: 4rem; color: var(--primary-color)"></i>
                    <div class="text-surface-900 dark:text-surface-0 text-3xl font-medium mb-4">{{ heading }}</div>
                    @if (subtitle) {
                        <span class="text-muted-color font-medium">{{ subtitle }}</span>
                    }
                </div>

                <!-- DYNAMIC CONTENT -->
                <ng-content></ng-content>

            </div>
        </div>

    </div>
</div>
