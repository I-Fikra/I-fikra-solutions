<p-toast />

<div class="card flex flex-col gap-7">
  <!-- ── Section header ── -->
  <div class="flex items-start gap-4 mb-1">
    <div class="w-11 h-11 rounded-[10px] bg-[color-mix(in_srgb,var(--primary-color)_12%,transparent)] flex items-center justify-center shrink-0">
      <i class="pi pi-palette text-[1.2rem] text-(--primary-color)"></i>
    </div>
    <div>
      <h2 class="text-(--text-color) m-0 mb-1 font-bold text-xl! truncate min-w-0">
        Theme &amp; Appearance
      </h2>
      <p class="text-(--text-color-secondary) m-0 leading-[1.5]">
        Choose a theme, fine-tune its tokens, set the visual personality, and
        define color groups for your users.
      </p>
    </div>
  </div>

 

  <!-- ── Step content ── -->
  @if (activeStepKey() === 'themes') {
    <app-ta-themes (saved)="onStepSaved()" (customSelected)="goToFineTune()" />
  }
  @if (activeStepKey() === 'custom-theme') {
    <app-ta-custom-theme (saved)="onStepSaved()" />
  }


  <!-- ── Global back button ── -->
  <div class="ta-wizard-back">
    <button
      class="ta-wizard-back__btn"
      [disabled]="isFirst()"
      (click)="goBack()"
    >
      <i class="pi pi-arrow-left"></i>
      Back
    </button>
  </div>
</div>
