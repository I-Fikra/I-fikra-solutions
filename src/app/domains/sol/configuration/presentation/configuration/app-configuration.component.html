<p-toast />
<nav class="app-config-nav__list mb-7">
  @for (section of navSections; track section.key) {
    <button
      class="app-config-nav__item"
      [class.app-config-nav__item--active]="activeSection() === section.key"
      (click)="setSection(section.key)"
    >
      <span class="nav-item__icon-wrap">
        <i [class]="section.icon"></i>
      </span>
      <span class="nav-item__text">
        <span class="nav-item__label">{{ section.label }}</span>
        <span class="nav-item__desc">{{ section.description }}</span>
      </span>
      @if (isSectionDone(section.key)) {
        <i class="pi pi-check-circle nav-item__done"></i>
      }
    </button>
  }
</nav>

<!-- ── MAIN CONTENT ─────────────────────────────────────────────── -->
<main class="app-config-content">
  <!-- ══ BRANDING SECTION ══════════════════════════════════════════ -->
  @if (activeSection() === 'branding') {
    <app-branding (saved)="onBrandingSaved()" />
  }

  <!-- ══ THEME & APPEARANCE SECTION ════════════════════════════════ -->
  @if (activeSection() === 'theme-appearance') {
    <app-theme-appearance (done)="onThemeAppearanceDone()" />
  }

  <!-- ══ CUSTOMIZE SECTION ═════════════════════════════════════════ -->
  @if (activeSection() === 'customize') {
    <app-customize (themeApplied)="onCustomizeDone()" />
  }

  <!-- ══ PROJECT SETUP SECTION ════════════════════════════════════ -->
  @if (activeSection() === 'setup') {
    <div class="config-section config-section--fullwidth">
      <app-domains />
    </div>
  }
</main>
