<div class="card config-section config-section--wide">
  <div class="config-section__header">
    <div class="config-section__header-icon">
      <i class="pi pi-sliders-h"></i>
    </div>
    <div>
      <h2 class="config-section__title font-bold text-xl! truncate min-w-0">
        Customize
      </h2>
      <p class="config-section__desc">
        Fine-tune appearance, define personality tokens, and configure color
        groups for users to pick from.
      </p>
    </div>
  </div>

  <!-- ══ LIVE PREVIEW TABS — outside the preview box ══════════════════════ -->
  <div class="preview-selector preview-selector--standalone">
    @for (sec of builderSections; track sec.key) {
      <button
        class="preview-selector__chip"
        [class.preview-selector__chip--active]="activeBuilderSection() === sec.key"
        (click)="activeBuilderSection.set(sec.key)"
      >
        <i [class]="sec.icon"></i>
        <span>{{ sec.label }}</span>
      </button>
    }

    <!-- Mobile only: toggle preview panel -->
    <button
      class="preview-selector__chip preview-selector__chip--expand preview-selector__chip--mobile-toggle"
      [class.preview-selector__chip--active]="previewExpanded()"
      (click)="togglePreviewExpanded()"
      [pTooltip]="previewExpanded() ? 'Hide Preview' : 'Show Preview'"
      tooltipPosition="top"
    >
      <i class="pi" [class.pi-eye-slash]="previewExpanded()" [class.pi-eye]="!previewExpanded()"></i>
      <span>{{ previewExpanded() ? 'Hide Preview' : 'Preview' }}</span>
    </button>
  </div>

  <div class="customize-layout customize-layout--always-split" [class.customize-layout--preview-open]="previewExpanded()">
    <div class="customize-layout__settings config-card config-card--personality">
      <app-personality-picker
        [activeSection]="activeBuilderSection()"
        [previewExpanded]="true"
        (activeSectionChange)="activeBuilderSection.set($event)"
      />
    </div>

    <!-- Always visible on large screens; toggled on small screens -->
    <div class="customize-layout__preview" [class.customize-layout__preview--hidden]="!previewExpanded()">
      <app-personality-picker
        [activeSection]="activeBuilderSection()"
        [previewExpanded]="true"
        [fullPageOnly]="true"
      />
    </div>
  </div>

  <!-- ══ DEMO LAUNCHER ══════════════════════════════════════════════════════ -->
  <div class="demo-launcher">
    <div class="demo-launcher__info">
      <i class="pi pi-desktop"></i>
      <span>Preview your theme on the full platform demo</span>
    </div>
    <button class="demo-launcher__btn" (click)="openDemo()">
      <i class="pi pi-external-link"></i>
      Open Demo
    </button>
  </div>

</div>
