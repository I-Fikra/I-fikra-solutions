<div
  class="bg-surface-0 dark:bg-surface-900 rounded-md h-full flex flex-col overflow-hidden transition-all duration-300"
  [ngClass]="{
    'cursor-pointer': isClickable,
    'hover:shadow-md': isClickable,
    'hover:ring-1': isClickable,
    'hover:ring-primary-300': isClickable,
    'dark:hover:ring-primary-600': isClickable,
  }"
  (click)="handleClick()"
>
  <!-- ══ Header ══════════════════════════════════════════════════════════════ -->
  @if (hasHeader) {
  <div
    class="p-5 border-b border-surface-200 dark:border-surface-700 bg-surface-50 dark:bg-surface-800"
  >
    @if (headerTemplate) {
    <!-- Full custom template -->
    <ng-container *ngTemplateOutlet="headerTemplate" />
    } @else {
    <!-- Dynamic string inputs -->
    <div class="flex flex-col gap-1">
      @if (title()) {
      <span
        class="font-semibold text-surface-900 dark:text-surface-0 text-base leading-snug"
      >
        {{ title() }}
      </span>
      } @if (subtitle()) {
      <span class="text-sm text-surface-500 dark:text-surface-400">
        {{ subtitle() }}
      </span>
      }
    </div>
    }
  </div>
  }

  <!-- ══ Body ════════════════════════════════════════════════════════════════ -->
  @if (bodyTemplate) {
  <div class="flex flex-col gap-2 p-5 flex-1">
    <ng-container *ngTemplateOutlet="bodyTemplate" />
  </div>
  } @else {
  <!-- Slot للـ ng-content العادي لو مفيش template -->
  <div class="flex flex-col gap-2 p-5 flex-1">
    <ng-content />
  </div>
  }

  <!-- ══ Footer ══════════════════════════════════════════════════════════════ -->
  <div
    class="p-2 border-t border-surface-200 dark:border-surface-700 bg-surface-50 dark:bg-surface-800"
  >
    @if (footerTemplate) {
    <!-- Full custom template -->
    <div class="p-3">
      <ng-container *ngTemplateOutlet="footerTemplate" />
    </div>
    } @else {
    <!-- Dynamic string input -->
    <span class="text-sm text-surface-500 dark:text-surface-400">
      {{ footerText() }}
    </span>
    }
  </div>
</div>
