<!-- ════════════════════════════════════════
     JIRA FILTER — Trigger Button
════════════════════════════════════════ -->
<div
    class="jf-host"
    [class.jf-open]="isOpen()"
    [class.jf-active]="hasSelection()"
    [class.jf-disabled]="disabled"
>
    <!-- ── Trigger Button ── -->
    <button
        type="button"
        class="jf-trigger"
        [disabled]="disabled"
        (click)="toggleOpen()"
        [attr.aria-expanded]="isOpen()"
        [attr.aria-haspopup]="true"
    >
        <!-- Label -->
        <span class="jf-trigger__label">{{ label }}</span>

        <!-- Operator (when selection exists) -->
        <ng-container *ngIf="hasSelection() && showOperator">
            <span
                class="jf-trigger__op"
                (click)="$event.stopPropagation(); toggleOpen()"
            >
                {{ operatorLabel() }}
            </span>
        </ng-container>

        <!-- Equals sign when no operator selector -->
        <ng-container *ngIf="hasSelection() && !showOperator">
            <span class="jf-trigger__eq">=</span>
        </ng-container>

        <!-- Selected value text -->
        <span *ngIf="hasSelection()" class="jf-trigger__value">
            {{ buttonText() }}
        </span>

        <!-- Clear button -->
        <button
            *ngIf="hasSelection() && showClear"
            type="button"
            class="jf-trigger__clear"
            (click)="clearAll($event)"
            [attr.aria-label]="'shared.filter.clearFilter' | transloco"
        >
            <svg width="8" height="8" viewBox="0 0 8 8" fill="none">
                <path
                    d="M1 1l6 6M7 1L1 7"
                    stroke="currentColor"
                    stroke-width="1.5"
                    stroke-linecap="round"
                />
            </svg>
        </button>

        <!-- Chevron -->
        <span
            class="jf-trigger__chevron"
            [class.jf-trigger__chevron--up]="isOpen()"
        >
            <svg width="10" height="6" viewBox="0 0 10 6" fill="none">
                <path
                    d="M1 1l4 4 4-4"
                    stroke="currentColor"
                    stroke-width="1.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                />
            </svg>
        </span>
    </button>

    <!-- ════════════════════════════════════════
       DROPDOWN PANEL
  ════════════════════════════════════════ -->
    <div
        *ngIf="isOpen()"
        class="jf-panel"
        #panelRef
        role="listbox"
        [attr.aria-multiselectable]="true"
        [attr.aria-label]="
            'shared.filter.optionsFor' | transloco: { label: label }
        "
    >
        <!-- ── Operator Row (optional) ── -->
        <div *ngIf="showOperator" class="jf-operator-row">
            <span class="jf-operator-label">{{ label }}</span>
            <div class="jf-operator-select">
                <button
                    *ngFor="let op of operatorOptions"
                    type="button"
                    class="jf-op-btn"
                    [class.jf-op-btn--active]="operator === op.value"
                    (click)="selectOperator(op.value)"
                >
                    {{ op.label }}
                </button>
            </div>
        </div>

        <!-- ── Search ── -->
        <div class="jf-search">
            <svg
                class="jf-search__icon"
                width="12"
                height="12"
                viewBox="0 0 12 12"
                fill="none"
            >
                <circle
                    cx="5"
                    cy="5"
                    r="4"
                    stroke="currentColor"
                    stroke-width="1.4"
                />
                <path
                    d="M8.5 8.5L11 11"
                    stroke="currentColor"
                    stroke-width="1.4"
                    stroke-linecap="round"
                />
            </svg>
            <input
                class="jf-search__input"
                type="text"
                [placeholder]="
                    'shared.filter.searchFor' | transloco: { label: label }
                "
                [ngModel]="searchText()"
                (ngModelChange)="searchText.set($event)"
                (click)="$event.stopPropagation()"
                autocomplete="off"
                #searchInput
            />
            <button
                *ngIf="searchText()"
                type="button"
                class="jf-search__clear"
                (click)="$event.stopPropagation(); searchText.set('')"
            >
                <svg width="8" height="8" viewBox="0 0 8 8" fill="none">
                    <path
                        d="M1 1l6 6M7 1L1 7"
                        stroke="currentColor"
                        stroke-width="1.5"
                        stroke-linecap="round"
                    />
                </svg>
            </button>
        </div>

        <!-- ── Options List ── -->
        <div class="jf-options">
            <ng-container *ngIf="filteredOptions().length; else noResults">
                <button
                    *ngFor="let opt of filteredOptions(); trackBy: trackByValue"
                    type="button"
                    class="jf-option"
                    [class.jf-option--selected]="isSelected(opt.value)"
                    role="option"
                    [attr.aria-selected]="isSelected(opt.value)"
                    (click)="toggleOption(opt.value)"
                >
                    <!-- Custom checkbox -->
                    <span class="jf-option__check">
                        <svg
                            *ngIf="isSelected(opt.value)"
                            width="10"
                            height="8"
                            viewBox="0 0 10 8"
                            fill="none"
                        >
                            <path
                                d="M1 4l3 3 5-6"
                                stroke="currentColor"
                                stroke-width="1.8"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            />
                        </svg>
                    </span>

                    <!-- Color dot -->
                    <span
                        *ngIf="opt.color"
                        class="jf-option__dot"
                        [style.background]="opt.color"
                    ></span>

                    <!-- Icon -->
                    <i
                        *ngIf="opt.icon && !opt.color"
                        [class]="opt.icon + ' jf-option__icon'"
                    ></i>

                    <!-- Label -->
                    <span class="jf-option__label">{{ opt.label }}</span>
                </button>
            </ng-container>

            <!-- No results -->
            <ng-template #noResults>
                <div class="jf-no-results">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <circle
                            cx="7"
                            cy="7"
                            r="5.5"
                            stroke="currentColor"
                            stroke-width="1.3"
                        />
                        <path
                            d="M11.5 11.5L14 14"
                            stroke="currentColor"
                            stroke-width="1.3"
                            stroke-linecap="round"
                        />
                    </svg>
                    <span>{{
                        'shared.filter.noResultsFor'
                            | transloco: { query: searchText() }
                    }}</span>
                </div>
            </ng-template>
        </div>

        <!-- ── Footer ── -->
        <div *ngIf="hasSelection()" class="jf-footer">
            <span class="jf-footer__count"
                >{{ selectedCount() }}
                {{ 'shared.bottomBar.selectedSuffix' | transloco }}</span
            >
            <button
                type="button"
                class="jf-footer__clear"
                (click)="clearAll($event)"
            >
                {{ 'shared.bottomBar.clearSelection' | transloco }}
            </button>
        </div>
    </div>
</div>
