<div class="lp-focused lp-focused--center">
  <div class="lp-login-preview"
       [ngClass]="'lp-login--' + loginStyle().layout"
       [style.background]="loginStyle().background">

    @if (loginStyle().layout === 'split') {
      <div class="lp-login__split-left">
        <div class="lp-login__split-graphic"></div>
      </div>
    }

    <div class="lp-login__card" [style.border-radius]="loginStyle().cardRadius">
      @if (loginStyle().logoPos !== 'hidden') {
        <div class="lp-login__logo" [class.lp-login__logo--left]="loginStyle().logoPos === 'left'">
          <div class="lp-login__logo-ph"></div>
        </div>
      }
      <div class="lp-login__field" [style.border-radius]="loginStyle().inputRadius"></div>
      <div class="lp-login__field" [style.border-radius]="loginStyle().inputRadius"></div>
      <button class="lp-btn lp-btn--ok lp-login__btn"
              [style.border-radius]="loginStyle().btnRadius">Sign In</button>
    </div>

  </div>
</div>
