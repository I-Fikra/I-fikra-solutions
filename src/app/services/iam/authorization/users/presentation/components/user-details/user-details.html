<app-dialog-shell
  [visible]="visible"
  [showHeader]="true"
  [closable]="true"
  [blockScroll]="true"
  [baseZIndex]="20000"
  [style]="{ width: '450px' }"
  styleClass="user-details-dialog"
  [hideFooter]="false"
  (visibleChange)="onVisibleChange($event)"
  (onShow)="onDialogShow()"
  [header]="isEditMode() ? ('actions.edit' | transloco) : displayName()"
>
  <ng-template #dialogContent>
    <div class="user-dialog" [attr.dir]="languageDir()">
      <!-- ── View mode ──────────────────────────────────────────── -->
      @if (!isEditMode()) {
      <div class="details-stack">
        @for (row of detailRows(); track row.field) {
        <div class="detail-row">
          <span class="detail-icon">
            <i class="pi" [ngClass]="row.icon.replace('pi ', '')"></i>
          </span>
          <div class="detail-content">
            <label>{{ row.label }}</label>
            <p>{{ row.value }}</p>
          </div>
        </div>
        }
      </div>
      }

      <!-- ── Edit mode ──────────────────────────────────────────── -->
      @if (isEditMode()) {
      <div class="edit-form">
        @for (field of editFields(); track field.id) {
        <div class="form-group">
          <label [for]="field.id">{{ field.label }}</label>

          <!-- Enum field → dropdown -->
          @if (field.isEnum) {
          <p-select
            [inputId]="field.id"
            [options]="field.options"
            [(ngModel)]="editableUser()[field.key]"
            optionLabel="label"
            optionValue="value"
            appendTo="body"
            styleClass="status-dropdown"
            panelStyleClass="status-dropdown-panel"
          />
          }

          <!-- Free-text field → input -->
          @if (!field.isEnum) {
          <div class="input-wrapper">
            <i [class]="field.icon"></i>
            <input
              [id]="field.id"
              pInputText
              [type]="field.type"
              [(ngModel)]="editableUser()[field.key]"
              title="{{ 'users.details.editFieldTooltip' | transloco }}"
            />
          </div>
          }
        </div>
        }

        <!-- Status dropdown — driven from meta_data enum -->
        @if (statusOptions().length) {
        <div class="form-group">
          <label for="userStatus"
            >{{ 'shared.common.status' | transloco }}</label
          >
          <p-select
            inputId="userStatus"
            [options]="statusOptions()"
            [(ngModel)]="editableUser()['status']"
            optionLabel="label"
            optionValue="value"
            appendTo="body"
            styleClass="status-dropdown"
            panelStyleClass="status-dropdown-panel"
          />
        </div>
        }
      </div>
      }
    </div>
  </ng-template>

  <ng-template #dialogFooter>
    @if (!isEditMode()) {
    <div class="flex justify-end gap-2">
      <p-button
        [label]="'actions.edit' | transloco"
        icon="pi pi-pencil"
        (onClick)="openEditMode()"
      />
    </div>
    } @if (isEditMode()) {
    <div class="flex justify-end gap-2">
      <p-button
        [label]="'actions.cancel' | transloco"
        severity="secondary"
        (onClick)="cancelEdit()"
      />
      <p-button
        [label]="'actions.save' | transloco"
        icon="pi pi-check"
        [loading]="saving()"
        (onClick)="saveUser()"
      />
    </div>
    }
  </ng-template>
</app-dialog-shell>
